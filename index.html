<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAR GLB Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="debugUIEnabled: false; sourceType: webcam; videoTexture: true;">
    
    <a-assets>
      <a-asset-item id="my-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-gltf-model src="#my-model" scale="1 1 1" position="0 0 0" rotation="0 0 0"></a-gltf-model>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
