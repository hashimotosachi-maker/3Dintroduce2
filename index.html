<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAR GLB Model Player</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="debugUIEnabled: false; sourceType: webcam;">
    
    <a-assets>
      <a-asset-item id="my-model" src="asset.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-gltf-model src="#my-model" scale="0.5 0.5 0.5" position="0 0 0" rotation="0 0 0"></a-gltf-model>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
